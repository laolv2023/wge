# =============================================================================
# WGE-Kafka Detector — Docker Compose 配置
#
# 用途:
#   使用 Docker Compose 编排 WGE-Kafka Detector 及依赖的 Kafka/ZooKeeper 服务。
#
# 使用方式:
#   # 仅启动 WGE Detector（需要外部 Kafka）
#   docker compose up -d wge-detector
#
#   # 启动全套开发测试环境
#   docker compose --profile dev up -d
#
#   # 查看日志
#   docker compose logs -f wge-detector
#
#   # 停止所有服务
#   docker compose down
#
# 服务:
#   wge-detector    WGE-Kafka 安全检测服务（核心）
#   kafka           Apache Kafka（开发测试，profile: dev）
#   zookeeper       Apache ZooKeeper（开发测试，profile: dev）
# =============================================================================

version: "3.9"

# ============================================================================
# 网络
# ============================================================================
networks:
  wge-net:
    driver: bridge
    name: wge-net

# ============================================================================
# 卷
# ============================================================================
volumes:
  wge-logs:
    name: wge-detector-logs
  wge-wal:
    name: wge-detector-wal
  kafka-data:
    name: wge-kafka-data
  zk-data:
    name: wge-zk-data

# ============================================================================
# 服务
# ============================================================================
services:

  # --------------------------------------------------------------------------
  # WGE-Kafka Detector — 核心服务
  # --------------------------------------------------------------------------
  wge-detector:
    image: wge-kafka-detector:latest
    container_name: wge-detector
    restart: unless-stopped

    networks:
      - wge-net

    ports:
      - "${HEALTH_PORT:-9100}:9100"     # Health check endpoint
      - "${METRICS_PORT:-9101}:9101"    # Prometheus metrics endpoint

    volumes:
      # 配置文件（只读）
      - ${CONFIG_PATH:-./config/wge-detector.yaml}:/etc/wge/wge-detector.yaml:ro
      - ${LOG_MAPPING_PATH:-./config/log_mapping.yaml}:/etc/wge/log_mapping.yaml:ro
      # WGE 规则文件（只读）
      - ${WGE_RULES_PATH:-./config/rules}:/opt/wge/rules:ro
      # 运行时数据
      - wge-logs:/var/log/wge
      - wge-wal:/var/lib/wge/wal

    environment:
      # ---- 应用配置 ----
      - WGE_INSTANCE_NAME=${WGE_INSTANCE_NAME:-wge-detector-01}

      # ---- Kafka 连接 ----
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-SCRAM-SHA-512}
      - KAFKA_SASL_USERNAME=${KAFKA_SASL_USERNAME:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}

      # ---- Akto 输入 Topic (可配置: akto.api.logs | akto.api.logs2) ----
      - AKTO_INPUT_TOPIC=${AKTO_INPUT_TOPIC:-akto.api.logs2}

      # ---- 检测配置 ----
      - WGE_WORKER_THREADS=${WGE_WORKER_THREADS:-4}
      - WGE_BATCH_SIZE=${WGE_BATCH_SIZE:-500}
      - WGE_DETECTION_TIMEOUT_MS=${WGE_DETECTION_TIMEOUT_MS:-1000}

      # ---- 可观测性 ----
      - WGE_LOG_LEVEL=${WGE_LOG_LEVEL:-info}
      - WGE_LOG_FORMAT=${WGE_LOG_FORMAT:-text}
      - WGE_METRICS_ENABLED=${WGE_METRICS_ENABLED:-true}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: "${WGE_CPU_LIMIT:-4.0}"
          memory: "${WGE_MEMORY_LIMIT:-4g}"
        reservations:
          cpus: "${WGE_CPU_RESERVE:-1.0}"
          memory: "${WGE_MEMORY_RESERVE:-1g}"

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

    # 依赖（可选：如果使用外部 Kafka，此依赖无效但无害）
    depends_on:
      kafka:
        condition: service_healthy
        required: false

  # --------------------------------------------------------------------------
  # Apache ZooKeeper（开发测试用，profile: dev）
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: wge-zookeeper
    restart: unless-stopped
    profiles:
      - dev

    networks:
      - wge-net

    ports:
      - "${ZK_PORT:-2181}:2181"

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2

    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-data:/var/lib/zookeeper/log

    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1g"

  # --------------------------------------------------------------------------
  # Apache Kafka（开发测试用，profile: dev）
  # --------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: wge-kafka
    restart: unless-stopped
    profiles:
      - dev

    networks:
      - wge-net

    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "${KAFKA_CTRL_PORT:-9093}:9093"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://${KAFKA_ADVERTISED_HOST:-kafka}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    volumes:
      - kafka-data:/var/lib/kafka/data

    depends_on:
      zookeeper:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2g"

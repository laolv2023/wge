syntax = "proto3";
package wge.kafka;

// Kafka output topic: akto.threat_detection.malicious_events
// 对齐 Akto MaliciousEventKafkaEnvelope (account_id + actor + MaliciousEventMessage)
message WgeAlertEvent {
  string  alert_id        = 1;   // UUID v7
  int64   timestamp_ms    = 2;   // 检测时间

  // ---- 关联 ----
  string  event_id        = 10;  // 关联原始 HttpAccessEvent.event_id
  string  collector_id    = 11;  // 采集源

  // ---- 检测结果 ----
  bool    intervened      = 20;  // 是否触发拦截动作
  string  disruptive_action = 21; // DENY/DROP/REDIRECT/ALLOW 等
  int32   response_code   = 22;  // 规则设定的 HTTP 状态码
  string  redirect_url    = 23;  // REDIRECT 目标 URL

  // ---- 匹配规则 ----
  repeated MatchedRule matched_rules = 30;

  // ---- 原始请求摘要 (用于告警展示，不含 body) ----
  string  request_method  = 40;
  string  request_uri     = 41;
  string  downstream_ip   = 42;
  string  upstream_ip     = 43;

  // ---- Akto 集成字段 (对齐 MaliciousEventMessage) ----
  // P0-02修复: 添加 Akto 透传字段, 实现 WgeAlertEvent → MaliciousEventKafkaEnvelope 转换
  string  akto_account_id     = 50;  // Akto 多租户 ID (透传 HttpResponseParam.akto_account_id)
  int32   akto_collection_id  = 51;  // Akto API Collection ID (透传 HttpResponseParam.api_collection_id, 防0机制)
  string  request_host        = 52;  // HTTP Host header (用于 api_collection_id 防0兜底)
  string  request_body        = 53;  // 原始请求 body (用于 Raw HTTP 重构)
  string  response_status     = 54;  // HTTP 响应状态行 (如 "200 OK")

  // ---- Akto 告警字段 (对齐 MaliciousEventMessage) ----
  // P1-03修复: 添加 Adapter 构造告警所需的字段
  string  attack_type         = 60;  // 攻击类型 (映射到 Akto sub_category, 如 SQLInjection)
  string  severity            = 61;  // 严重程度 (CRITICAL/HIGH/MEDIUM/LOW)
  bool    successful_exploit  = 62;  // 保守判定: 默认 false, 仅极高置信度时设 true
  string  context_source      = 63;  // 固定 "API" (对齐 Akto context_source)
  string  label               = 64;  // 固定 "THREAT" (对齐 Akto label)
}

message MatchedRule {
  uint64  rule_id         = 1;   // SecRule id
  string  rule_msg        = 2;
  string  rule_severity   = 3;  // CRITICAL/ERROR/WARNING/NOTICE
  string  rule_ver        = 4;  // 规则集版本
  repeated string rule_tags = 5;

  // 匹配变量
  string  matched_var_name   = 10;
  string  matched_var_value   = 11;  // 变换后的值
  string  matched_var_original = 12; // 原始值

  // 匹配操作
  string  operator_name   = 20;  // @rx / @detectSQLi / @xss 等
  string  operator_param  = 21;  // 正则表达式等
}

// Kafka DLQ topic: http-access-dlq
message DeadLetterEvent {
  string  original_topic    = 1;
  int32   original_partition = 2;
  int64   original_offset   = 3;
  bytes   original_payload  = 4;  // 原始消息
  string  error_message     = 5;
  int64   timestamp_ms      = 6;
}
